<!DOCTYPE html>
<html lang="th">
<head>
    <!-- 1. ย้ายมาไว้บนสุดเพื่อความเสถียรในการโหลด -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Up Pop! - เรียนเต้นออนไลน์ & ไลฟ์สด (LiveKit Optimized)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        window.addEventListener("load", () => {
            // ตรวจสอบความพร้อมของ SDK
            const isAvailable = typeof window.LiveKitClient !== "undefined" || typeof window.LiveKit !== "undefined";
            if (!isAvailable) {
                console.error("LiveKit โหลดไม่เข้า ❌");
                const errorBox = document.createElement('div');
                errorBox.className = "fixed top-5 left-1/2 -translate-x-1/2 z-[200] bg-red-600 text-white px-6 py-4 border-4 border-black font-black uppercase pop-shadow-sm text-center";
                errorBox.innerHTML = "โหลดระบบ LiveKit ไม่สำเร็จ! ❌<br>กรุณารีเฟรชหรือเช็คการเชื่อมต่อ";
                document.body.appendChild(errorBox);
            } else {
                console.log("LiveKit พร้อมใช้งาน ✅");
                checkAutoJoin();
            }
        });
    </script>

    <style>
        :root {
            --pop-yellow: #FFD700;
            --pop-pink: #FF00FF;
            --pop-cyan: #00FFFF;
            --pop-green: #39FF14;
            --pop-black: #000000;
            --pop-white: #FFFFFF;
            --pop-red: #FF3131;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f0f0f0;
            background-image: radial-gradient(var(--pop-black) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: var(--pop-black);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .pop-shadow { box-shadow: 8px 8px 0px 0px var(--pop-black); }
        .pop-shadow-sm { box-shadow: 4px 4px 0px 0px var(--pop-black); }

        .magic-card {
            background: var(--pop-white);
            border: 4px solid var(--pop-black);
            transition: all 0.2s ease-in-out;
            flex: 0 0 auto;
            width: 280px;
        }

        @media (max-width: 640px) { .magic-card { width: 180px; } }

        .magic-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px 0px var(--pop-black);
        }

        .slide-container {
            display: flex;
            overflow-x: auto;
            gap: 2rem;
            padding: 1rem 1rem 3rem 1rem;
            scrollbar-width: none;
        }
        .slide-container::-webkit-scrollbar { display: none; }

        .cat-pill {
            background: var(--pop-white);
            border: 3px solid var(--pop-black);
            font-weight: 800;
            text-transform: uppercase;
        }

        .cat-pill.active { background: var(--pop-cyan); transform: rotate(-2deg); box-shadow: 4px 4px 0px 0px var(--pop-black); }

        .header-box {
            background: var(--pop-yellow);
            border-bottom: 6px solid var(--pop-black);
        }

        .section-tag {
            background: var(--pop-black);
            color: var(--pop-white);
            padding: 4px 12px;
            font-weight: 900;
            display: inline-block;
            transform: skewX(-10deg);
        }

        .pulse-live { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(0.95); opacity: 1; }
        }

        #video-layer {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 1;
        }

        #video-layer video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .live-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }
        
        .live-badge {
            background: var(--pop-red);
            color: white;
            padding: 2px 8px;
            font-weight: 900;
            font-size: 12px;
            border: 2px solid black;
        }

        .viewer-count {
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 10px;
            border-radius: 99px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1.5px solid rgba(255,255,255,0.3);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <header class="sticky top-0 z-50 header-box">
        <div class="max-w-7xl mx-auto px-4 py-4 space-y-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4 cursor-pointer" onclick="goHome()">
                    <div class="w-14 h-14 bg-white border-4 border-black pop-shadow-sm flex items-center justify-center -rotate-6 hover:rotate-0 transition-transform">
                        <i data-lucide="music" class="text-black w-8 h-8"></i>
                    </div>
                    <div class="flex flex-col">
                        <h1 class="text-3xl font-black tracking-tighter text-black uppercase italic leading-none" style="-webkit-text-stroke: 1px white;">สอนเต้นออนไลน์</h1>
                        <p class="text-[11px] font-black bg-black text-white px-2 mt-1 inline-block self-start uppercase">DANCE & LIVE LOBBY!</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <button id="live-lobby-btn" onclick="openLiveLobby()" class="group relative flex items-center gap-2 px-4 h-12 bg-white border-4 border-black pop-shadow-sm hover:bg-red-500 hover:text-white transition-all">
                        <div class="w-3 h-3 bg-red-600 rounded-full pulse-live group-hover:bg-white"></div>
                        <span class="font-black italic uppercase tracking-tighter hidden md:block">LIVE NOW</span>
                        <i data-lucide="radio" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>

            <div class="relative w-full group">
                <input type="text" id="search-input" oninput="handleSearch(this.value)"
                       placeholder="ค้นหาท่าเต้นสุดมันส์..." 
                       class="w-full bg-white border-4 border-black rounded-none py-4 pl-12 pr-4 text-lg font-bold focus:outline-none transition-all pop-shadow-sm">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-6 h-6 text-black"></i>
            </div>

            <div id="category-bar" class="flex overflow-x-auto gap-3 pb-2 scroll-smooth no-scrollbar py-1"></div>
        </div>
    </header>

    <main id="main-content" class="max-w-7xl mx-auto pt-8">
        <div id="loader" class="flex flex-col items-center justify-center py-40">
            <div class="w-20 h-20 bg-white border-8 border-black flex items-center justify-center pop-shadow animate-bounce">
                <i data-lucide="zap" class="w-10 h-10 text-yellow-500 fill-current"></i>
            </div>
            <p class="mt-8 text-black text-xl font-black italic tracking-tighter uppercase animate-pulse">กำลังวอร์มอัพร่างกาย...</p>
        </div>
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
        <div class="bg-white border-4 border-black px-8 py-3 flex gap-12 pop-shadow">
            <button onclick="goHome()" class="flex flex-col items-center text-black hover:scale-110 transition-all">
                <i data-lucide="layout-grid" class="w-7 h-7"></i>
                <span class="text-[12px] font-black uppercase tracking-tight">คลาสเรียน</span>
            </button>
            <button onclick="openLiveLobby()" class="flex flex-col items-center text-black hover:scale-110 transition-all">
                <i data-lucide="video" class="w-7 h-7"></i>
                <span class="text-[12px] font-black uppercase tracking-tight">ไลฟ์สด</span>
            </button>
            <button onclick="openFavs()" class="flex flex-col items-center text-black hover:scale-110 transition-all">
                <i data-lucide="heart" class="w-7 h-7"></i>
                <span class="text-[12px] font-black uppercase tracking-tight">ที่บันทึก</span>
            </button>
        </div>
    </nav>

    <!-- Live Stream Modal -->
    <div id="live-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-0">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-md" onclick="closeLive()"></div>
        <div class="relative w-full max-w-lg bg-black h-full md:h-[90vh] md:max-h-[800px] md:border-8 border-black pop-shadow flex flex-col overflow-hidden">
            
            <!-- Video Layer -->
            <div id="video-layer"></div>

            <!-- Overlay UI Layer -->
            <div class="live-overlay p-4 flex flex-col justify-between h-full pointer-events-none">
                <div class="flex justify-between items-start pointer-events-auto">
                    <div class="flex items-center gap-2">
                        <div class="live-badge">LIVE</div>
                        <div class="viewer-count">
                            <i data-lucide="users" class="w-4 h-4"></i>
                            <span id="live-viewer-count">0</span>
                        </div>
                    </div>
                    <button onclick="closeLive()" class="bg-black/40 text-white w-10 h-10 rounded-full flex items-center justify-center border border-white/20">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>

                <div class="space-y-4 pointer-events-auto">
                    <div class="flex items-end justify-between">
                        <div class="flex-1">
                            <h3 id="live-room-title" class="text-white font-black italic text-2xl uppercase tracking-tighter drop-shadow-lg">ROOM NAME</h3>
                            <p id="live-status" class="text-white/80 font-bold text-sm uppercase drop-shadow-lg">CONNECTING...</p>
                        </div>
                        <div class="flex flex-col gap-4 items-center">
                            <button onclick="copyLiveLink()" class="w-12 h-12 bg-white/20 rounded-full border border-white/40 flex items-center justify-center text-white backdrop-blur-md">
                                <i data-lucide="share-2" class="w-7 h-7"></i>
                            </button>
                            <button id="host-controls" class="hidden w-12 h-12 bg-pop-cyan rounded-full border border-black flex items-center justify-center text-black pop-shadow-sm">
                                <i data-lucide="settings" class="w-7 h-7"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Room Modal -->
    <div id="create-live-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeCreateLive()"></div>
        <div class="relative w-full max-w-md bg-white border-8 border-black pop-shadow p-8">
            <h2 class="text-3xl font-black uppercase italic tracking-tighter mb-6">เริ่มไลฟ์สดของคุณ</h2>
            <div class="space-y-4">
                <div>
                    <label class="block font-black uppercase text-xs mb-1">ชื่อห้องเต้น</label>
                    <input type="text" id="live-title-input" placeholder="ใส่ชื่อห้องที่นี่..." class="w-full border-4 border-black p-3 font-bold focus:bg-yellow-100 outline-none">
                </div>
                <button onclick="startLiveKitSession('host')" class="w-full py-4 bg-cyan-400 border-4 border-black font-black uppercase text-xl pop-shadow-sm active:translate-x-1 active:translate-y-1 transition-all">
                    เปิดกล้องสอนเต้นเลย!
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTe2E7RJNm4g58PUOorzYdo7aGTGuWTTe4MpZzITqM9pSnHA-9Wi3foVDFhrfH930g7dBF08hiP2UwE/pub?output=csv";
        const WORKER_URL = "https://dancelive.tontakankeawpang.workers.dev"; 
        const LK_SERVER_URL = "wss://live-yeitmlw1.livekit.cloud";
        const LOBBY_API = "https://script.google.com/macros/s/AKfycbyB8nEcf0uQT5FFG24r6ZQNxNQYMQnxXLpvfIAXt8e-KJqmg0ANhYnvuhDFWxaQaHZQ/exec";

        let livekitRoom = null;
        let allVideos = [];
        let favorites = JSON.parse(localStorage.getItem('dance_pop_favs') || '[]');
        let currentVideo = null;
        let ytPlayer = null;
        let activeRole = 'viewer';

        // --- LiveKit & Lobby Logic ---

        function checkAutoJoin() {
            const params = new URLSearchParams(window.location.search);
            const autoTitle = params.get('room');
            if (autoTitle) {
                joinLiveFromLobby(autoTitle);
            }
        }

        async function startLiveKitSession(role, roomName = null) {
            activeRole = role;
            const title = roomName || document.getElementById('live-title-input').value.trim() || "POP DANCE LIVE";

            closeCreateLive();
            document.getElementById('live-room-title').innerText = title.toUpperCase();
            document.getElementById('live-status').innerText = "GETTING TOKEN...";
            document.getElementById('live-modal').classList.remove('hidden');

            try {
                // 1. Fetch Token
                const response = await fetch(`${WORKER_URL}?room=${encodeURIComponent(title)}&role=${role}`);
                const data = await response.json();
                const token = data.token;

                if (!token) throw new Error("ไม่ได้รับ Token จากระบบ");

                // 2. Setup Room with Dynamic Class Check (Case Sensitive Fix)
                const RoomClass = window.LiveKitClient?.Room || window.LiveKit?.Room;
                if (!RoomClass) {
                    throw new Error("หา Class Room ของ LiveKit ไม่เจอ");
                }

                livekitRoom = new RoomClass({
                    adaptiveStream: true,
                    dynacast: true,
                });

                // Get Event object dynamically too
                const LKEvents = window.LiveKitClient?.RoomEvent || window.LiveKit?.RoomEvent;

                livekitRoom.on(LKEvents.TrackSubscribed, (track, publication, participant) => {
                    if (track.kind === 'video') {
                        attachTrack(track, participant.sid);
                    } else if (track.kind === 'audio') {
                        track.attach();
                    }
                });

                livekitRoom.on(LKEvents.TrackUnsubscribed, (track, publication, participant) => {
                    track.detach();
                    const el = document.getElementById(`video-${participant.sid}`);
                    if (el) el.remove();
                });

                livekitRoom.on(LKEvents.ParticipantConnected, () => updateParticipantsCount());
                livekitRoom.on(LKEvents.ParticipantDisconnected, () => updateParticipantsCount());

                // 3. Connect
                await livekitRoom.connect(LK_SERVER_URL, token);
                document.getElementById('live-status').innerText = (role === 'host' ? "🔥 HOSTING LIVE" : "👀 VIEWING LIVE");
                updateParticipantsCount();

                if (role === 'host') {
                    document.getElementById('host-controls').classList.remove('hidden');
                    await livekitRoom.localParticipant.setCameraEnabled(true);
                    await livekitRoom.localParticipant.setMicrophoneEnabled(true);

                    const localTrackPub = Array.from(livekitRoom.localParticipant.videoTracks.values())[0];
                    if (localTrackPub && localTrackPub.track) {
                        attachTrack(localTrackPub.track, 'local');
                    }
                    
                    await registerRoom(title);
                }

            } catch (error) {
                console.error("LiveKit connection error:", error);
                document.getElementById('live-status').innerText = "ERROR!";
                showToast("เชื่อมต่อไม่สำเร็จ: " + error.message);
                setTimeout(closeLive, 2000);
            }
        }

        async function registerRoom(title) {
            try {
                await fetch(`${LOBBY_API}?action=add&room=${encodeURIComponent(title)}`, { mode: 'no-cors' });
            } catch (e) { console.warn("Lobby registration error:", e); }
        }

        async function removeRoom(title) {
            try {
                await fetch(`${LOBBY_API}?action=remove&room=${encodeURIComponent(title)}`, { mode: 'no-cors' });
            } catch (e) { console.warn("Lobby removal error:", e); }
        }

        function attachTrack(track, id) {
            const container = document.getElementById('video-layer');
            let videoEl = document.getElementById(`video-${id}`);
            if (!videoEl) {
                videoEl = track.attach();
                videoEl.id = `video-${id}`;
                videoEl.className = "absolute inset-0 w-full h-full object-cover transition-opacity duration-500";
                if (id === 'local') videoEl.style.transform = "scaleX(-1)";
                container.appendChild(videoEl);
            }
        }

        function updateParticipantsCount() {
            if (!livekitRoom) return;
            const count = livekitRoom.participants.size + 1;
            document.getElementById('live-viewer-count').innerText = count;
        }

        function copyLiveLink() {
            const room = document.getElementById('live-room-title').innerText;
            const shareUrl = `${window.location.origin}${window.location.pathname}?room=${encodeURIComponent(room)}`;
            const tempInput = document.createElement("input");
            document.body.appendChild(tempInput);
            tempInput.value = shareUrl;
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            showToast("คัดลอกลิงก์แชร์ห้องแล้ว! 🚀");
        }

        async function closeLive() {
            const currentTitle = document.getElementById('live-room-title').innerText;
            document.getElementById('live-modal').classList.add('hidden');
            if (activeRole === 'host') {
                await removeRoom(currentTitle);
            }
            if (livekitRoom) {
                await livekitRoom.disconnect();
                livekitRoom = null;
            }
            document.getElementById('video-layer').innerHTML = '';
            document.getElementById('host-controls').classList.add('hidden');
            lucide.createIcons();
            if (document.getElementById('active-lives-container')) {
                openLiveLobby();
            }
        }

        // --- Lobby Rendering ---

        async function openLiveLobby() {
            const container = document.getElementById('main-content');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            container.innerHTML = `
                <div class="px-6 mb-12">
                    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
                        <div>
                            <div class="section-tag mb-2 bg-red-600">LIVE DANCE AREA!</div>
                            <h2 class="text-6xl font-black italic uppercase italic">LOBBY</h2>
                        </div>
                        <button onclick="openCreateLive()" class="px-8 py-4 bg-pop-green border-4 border-black font-black uppercase text-xl pop-shadow hover:-translate-y-1 transition-all flex items-center gap-3">
                            <i data-lucide="plus-circle" class="w-8 h-8"></i>สร้างห้องเต้น
                        </button>
                    </div>
                    <div id="active-lives-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <div class="col-span-full py-20 text-center">
                            <p class="text-2xl font-black uppercase italic animate-pulse">กำลังค้นหาห้องเต้นที่กำลังไลฟ์...</p>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            
            try {
                const res = await fetch(LOBBY_API);
                const rooms = await res.json();
                renderRooms(rooms);
            } catch (e) {
                document.getElementById('active-lives-container').innerHTML = `
                    <div class="col-span-full py-10 text-center bg-red-100 border-4 border-black p-6">
                        <p class="text-xl font-black uppercase italic">ไม่สามารถดึงข้อมูลห้องได้ในขณะนี้!</p>
                        <button onclick="openLiveLobby()" class="mt-4 px-6 py-2 bg-black text-white font-black uppercase">ลองใหม่อีกครั้ง</button>
                    </div>
                `;
            }
        }

        function renderRooms(rooms) {
            const listContainer = document.getElementById('active-lives-container');
            if (rooms.length === 0) {
                listContainer.innerHTML = `
                    <div class="col-span-full py-20 text-center bg-white border-4 border-black pop-shadow">
                        <p class="text-2xl font-black uppercase italic text-black mb-4">ยังไม่มีใครเปิดห้องเต้นเลย...</p>
                        <button onclick="openCreateLive()" class="px-6 py-2 bg-black text-white font-black hover:bg-red-600 transition-all uppercase">เป็นคนแรกที่เริ่มเต้นสิ!</button>
                    </div>
                `;
                return;
            }

            const colors = ['#00FFFF', '#FF00FF', '#39FF14', '#FFD700'];
            listContainer.innerHTML = rooms.map((room, i) => `
                <div class="bg-white border-4 border-black pop-shadow p-6 relative group">
                    <div class="absolute top-4 right-4 bg-red-600 text-white px-3 py-1 font-black text-xs pulse-live border-2 border-black">LIVE</div>
                    <div class="aspect-video border-4 border-black mb-4 flex items-center justify-center overflow-hidden" style="background-color: ${colors[i % colors.length]}">
                        <i data-lucide="radio" class="w-16 h-16 text-black opacity-30"></i>
                    </div>
                    <h3 class="text-2xl font-black uppercase italic mb-4 line-clamp-1">${room.name}</h3>
                    <button onclick="joinLiveFromLobby('${room.name}')" class="w-full py-3 bg-black text-white font-black hover:bg-red-600 transition-all uppercase italic text-lg pop-shadow-sm">
                        ENTER ROOM
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function joinLiveFromLobby(name) {
            startLiveKitSession('viewer', name);
        }

        // --- Standard UI Content Logic ---

        async function fetchVideos() {
            try {
                const res = await fetch(CSV_URL);
                const data = await res.text();
                const rows = data.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
                allVideos = rows.map((row, i) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const cat = (cols[0] || 'DANCE').replace(/"/g, '').trim().toUpperCase();
                    const title = (cols[1] || 'NEW MOVE').replace(/"/g, '').trim();
                    const url = (cols[2] || '').replace(/"/g, '').trim();
                    const vId = extractID(url);
                    return { id: 'p_'+i, category: cat, title, vId, thumb: vId ? `https://i.ytimg.com/vi/${vId}/mqdefault.jpg` : null };
                }).filter(v => v.vId);
                document.getElementById('loader').classList.add('hidden');
                renderHome();
            } catch (e) { console.error(e); }
        }

        function extractID(url) {
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^?&"'>\s]+)/);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        function renderHome() {
            const container = document.getElementById('main-content');
            const categoryBar = document.getElementById('category-bar');
            if(!container || !categoryBar) return;
            container.innerHTML = ''; categoryBar.innerHTML = '';
            const groups = allVideos.reduce((acc, v) => { acc[v.category] = acc[v.category] || []; acc[v.category].push(v); return acc; }, {});
            Object.entries(groups).forEach(([cat, videos], idx) => {
                const btn = document.createElement('button');
                btn.className = 'cat-pill px-6 py-2.5 text-sm transition-all';
                btn.innerText = cat;
                btn.onclick = () => window.scrollTo({ top: document.getElementById('sec-'+idx).offsetTop - 200, behavior: 'smooth' });
                categoryBar.appendChild(btn);
                const section = document.createElement('section');
                section.id = 'sec-' + idx;
                section.className = 'mb-16';
                section.innerHTML = `<div class="px-6 mb-4"><div class="section-tag">${cat}</div><h2 class="text-4xl font-black italic uppercase">${cat} SESSION</h2></div><div class="slide-container">${videos.map((v, i) => renderCard(v, i)).join('')}</div>`;
                container.appendChild(section);
            });
            lucide.createIcons();
        }

        function renderCard(v, i) {
            const colors = ['#00FFFF', '#FF00FF', '#39FF14', '#FFD700'];
            return `<div class="magic-card group cursor-pointer overflow-hidden pop-shadow" onclick="playVideo('${v.vId}', '${v.title.replace(/'/g, "\\'")}', '${v.id}')"><div class="relative aspect-square border-b-4 border-black overflow-hidden bg-black"><img src="${v.thumb}" class="w-full h-full object-cover group-hover:scale-110 transition-transform opacity-90"><div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all"><div class="w-16 h-16 bg-white border-4 border-black flex items-center justify-center pop-shadow-sm"><i data-lucide="play" class="fill-current"></i></div></div></div><div class="p-4" style="background-color: ${colors[Math.floor(Math.random()*colors.length)]}"><h3 class="font-black text-black line-clamp-2 uppercase italic tracking-tighter">${v.title}</h3></div></div>`;
        }

        function openCreateLive() { document.getElementById('create-live-modal').classList.remove('hidden'); }
        function closeCreateLive() { document.getElementById('create-live-modal').classList.add('hidden'); }

        function playVideo(vId, title, id) {
            currentVideo = {vId, title, id};
            document.getElementById('modal-title').innerText = title;
            document.getElementById('video-modal').classList.remove('hidden');
            if (!ytPlayer) {
                ytPlayer = new YT.Player('player-container', { height: '100%', width: '100%', videoId: vId, playerVars: { 'autoplay': 1 } });
            } else { ytPlayer.loadVideoById(vId); }
            updateFavBtn();
        }

        function closeModal() { document.getElementById('video-modal').classList.add('hidden'); if(ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo(); }
        function goHome() { closeModal(); closeLive(); renderHome(); }
        function toggleFavoriteCurrent() {
            const idx = favorites.indexOf(currentVideo.id);
            if (idx > -1) favorites.splice(idx, 1); else favorites.push(currentVideo.id);
            localStorage.setItem('dance_pop_favs', JSON.stringify(favorites));
            updateFavBtn();
        }
        function updateFavBtn() {
            const btn = document.getElementById('modal-fav-btn');
            const isFav = favorites.includes(currentVideo.id);
            btn.className = isFav ? "px-10 py-4 bg-pink-500 text-white border-4 border-black font-black uppercase flex items-center gap-3 mx-auto pop-shadow-sm" : "px-10 py-4 bg-white text-black border-4 border-black font-black uppercase flex items-center gap-3 mx-auto pop-shadow-sm";
            btn.querySelector('span').innerText = isFav ? 'บันทึกแล้ว! BOOM!' : 'บันทึกท่านี้! CLICK!';
        }

        function openFavs() {
            const list = allVideos.filter(v => favorites.includes(v.id));
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="px-6 mb-12"><div class="section-tag mb-8 bg-pink-500">YOUR FAVORITES!</div><div class="grid grid-cols-2 md:grid-cols-4 gap-8">${list.map(v => renderCard(v, 0)).join('')}</div></div>`;
            lucide.createIcons();
        }

        function handleSearch(term) {
            const q = term.toLowerCase().trim();
            if(!q) return renderHome();
            const filtered = allVideos.filter(v => v.title.toLowerCase().includes(q) || v.category.toLowerCase().includes(q));
            document.getElementById('main-content').innerHTML = `<div class="px-6 mb-12"><div class="section-tag mb-8">SEARCH: ${term}</div><div class="grid grid-cols-2 md:grid-cols-4 gap-8">${filtered.map(v => renderCard(v, 0)).join('')}</div></div>`;
            lucide.createIcons();
        }

        function showToast(text) {
            const msg = document.createElement('div');
            msg.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 border-4 border-pop-cyan font-black z-[200] uppercase italic pop-shadow-sm text-center";
            msg.innerText = text;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // ใช้ addEventListener เพื่อความเสถียร
        window.addEventListener("load", () => {
            fetchVideos();
        });
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
